name: Renovate

on:
  workflow_dispatch:
  schedule:
    - cron: "10 15 * * *"

jobs:
  renovate:
    permissions:
      contents: write
      pull-requests: write
      issues: write
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Renovate
        uses: renovatebot/github-action@3633cede7d4d4598438e654eac4a695e46004420 # v46.1.7
        with:
          # 以下の Read and write が必要
          # Commit statuses, Contents, Issues, Pull requests
          # 以下の Read が必要
          # Dependabot alerts, Secret scanning alerts, Security events
          token: ${{ secrets.RENOVATE_TOKEN }}
          configurationFile: renovate.json
          renovate-version: 43.128.1@sha256:b4befe2e244bea27cf685ee6270478df87020ce61f6dfbd2e3966db2cfdee6b4
        env:
          # Explicitly target this repository to avoid "No repositories found" in self-hosted mode.
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          # Allow Gradle wrapper execution for lockfile/wrapper artifact updates.
          RENOVATE_ALLOWED_UNSAFE_EXECUTIONS: '["gradleWrapper"]'
