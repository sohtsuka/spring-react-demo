name: Renovate

on:
  workflow_dispatch:

jobs:
  renovate:
    permissions:
      contents: write
      pull-requests: write
      issues: write
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Renovate
        uses: renovatebot/github-action@68a3ea99af6ad249940b5a9fdf44fc6d7f14378b # v46.1.6
        with:
          # 以下の Read and write が必要
          # Commit statuses, Contents, Issues, Pull requests
          token: ${{ secrets.RENOVATE_TOKEN }}
          configurationFile: renovate.json
          renovate-version: 43.99.0@sha256:aae697086b93427dcde46eb92e08e334b018946ce19339bf044ce971ca1626e2
        env:
          # Explicitly target this repository to avoid "No repositories found" in self-hosted mode.
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          # Allow Gradle wrapper execution for lockfile/wrapper artifact updates.
          RENOVATE_ALLOWED_UNSAFE_EXECUTIONS: '["gradleWrapper"]'
