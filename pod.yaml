apiVersion: v1
kind: Pod
metadata:
  name: devenv
  labels:
    app: devenv
spec:
  containers:
    - name: postgres
      image: mirror.gcr.io/library/postgres:18.3
      ports:
        - containerPort: 5432
          hostPort: 5432
      env:
        - name: POSTGRES_DB
          value: appdb
        - name: POSTGRES_USER
          value: appuser
        - name: POSTGRES_PASSWORD
          value: apppassword
      volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql
      readinessProbe:
        exec:
          command: ["pg_isready", "-U", "appuser", "-d", "appdb"]
        initialDelaySeconds: 5
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 5
  volumes:
    - name: postgres-data
      persistentVolumeClaim:
        claimName: postgres-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
